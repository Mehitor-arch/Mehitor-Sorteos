<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Puerta - Mehitor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNy_IhwHe-BQuPxglJOv3ogmnc_ct3m8M",
    authDomain: "mehitor-sorteos.firebaseapp.com",
    projectId: "mehitor-sorteos",
    storageBucket: "mehitor-sorteos.firebasestorage.app",
    messagingSenderId: "270129705396",
    appId: "1:270129705396:web:e0b23a53e801796ad902e1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._doc = doc;
  window._getDoc = getDoc;
  window._updateDoc = updateDoc;
  window._collection = collection;
  window._onSnapshot = onSnapshot;
  window._query = query;
  window._orderBy = orderBy;
  window._firestoreReady = true;
</script>

<!-- QR Scanner -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: rgba(255,255,255,0.08); --accent: #c9f23a;
    --text: #f0f0f0; --muted: #666; --radius: 16px;
  }
  html, body {
    height: 100%; height: 100dvh;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; }
  .logo span { color: var(--accent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── EVENTO SELECTOR ── */
  #section-evento {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
  }
  .evento-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%; max-width: 360px;
    text-align: center;
  }
  .evento-card h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
  .evento-card p { color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }

  .eventos-lista { display: flex; flex-direction: column; gap: 12px; }
  .btn-evento {
    width: 100%; padding: 16px 20px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }
  .btn-evento:hover { border-color: var(--accent); background: rgba(201,242,58,0.06); }
  .btn-evento-icon { font-size: 1.5rem; flex-shrink: 0; }
  .btn-evento-nombre { flex: 1; }
  .btn-evento-arrow { color: var(--accent); font-size: 1.1rem; }

  /* ── SCANNER ── */
  #section-scanner {
    flex: 1;
    display: flex; flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  /* Camera area */
  #camera-section {
    position: relative;
    height: 56vh;
    min-height: 300px;
    flex-shrink: 0;
    overflow: hidden;
    background: #000;
  }

  #reader {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #reader > div { border: none !important; }
  #reader video { object-fit: cover; width: 100% !important; height: 100% !important; }

  .scanner-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .scan-frame {
    width: 200px; height: 200px;
    position: relative;
  }
  .scan-frame::before, .scan-frame::after,
  .scan-frame > span::before, .scan-frame > span::after {
    content: ''; position: absolute;
    width: 28px; height: 28px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-frame > span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-frame > span::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-line {
    position: absolute; left: 10px; right: 10px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s linear infinite;
    top: 10px;
  }
  @keyframes scanline { 0% { top: 10px; opacity:1; } 100% { top: 182px; opacity:0.3; } }
  .scan-hint {
    margin-top: 20px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    font-family: 'Syne', sans-serif; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
  }

  .contador {
    position: absolute; bottom: 52px; left: 0; right: 0;
    text-align: center;
    font-size: 12px; color: rgba(255,255,255,0.5);
    font-family: 'Syne', sans-serif; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    z-index: 20;
  }

  .manual-btn {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(26,26,26,0.9); border: 1px solid var(--border);
    color: var(--text); padding: 7px 13px; border-radius: 8px;
    font-size: 12px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-weight: 600; z-index: 20;
    backdrop-filter: blur(8px);
  }

  .manual-wrap {
    position: absolute; bottom: 52px; left: 12px; right: 12px;
    background: rgba(26,26,26,0.95); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; z-index: 20;
    display: flex; gap: 8px;
    backdrop-filter: blur(8px);
  }
  .manual-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px 14px;
    font-size: 16px; outline: none; font-family: 'DM Sans', sans-serif;
  }
  .manual-input:focus { border-color: var(--accent); }
  .manual-submit {
    background: var(--accent); color: #000; border: none;
    border-radius: 8px; padding: 10px 16px; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer;
  }

  /* Floating scroll arrow */
  #btn-ver-lista {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(201,242,58,0.15); border: 1px solid rgba(201,242,58,0.3);
    color: var(--accent); padding: 7px 13px; border-radius: 8px;
    font-size: 12px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-weight: 700; z-index: 20;
    backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 6px;
    animation: bounce-down 2s ease-in-out infinite;
  }
  @keyframes bounce-down {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  /* ── LISTA ── */
  #lista-section {
    flex-shrink: 0;
    background: var(--bg);
    padding: 1rem;
    padding-bottom: 2rem;
    min-height: 44vh;
  }

  .lista-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
    padding-top: 4px;
  }
  .lista-titulo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
  }
  .lista-stats-chips {
    display: flex; gap: 8px;
  }
  .chip {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 11px;
    padding: 3px 10px; border-radius: 100px; letter-spacing: 0.04em;
  }
  .chip-ok { background: rgba(58,255,160,0.15); color: #3affa0; }
  .chip-pending { background: rgba(255,255,255,0.07); color: var(--muted); }

  .lista-separador {
    font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    padding: 8px 0 6px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .lista-separador:first-child { border-top: none; margin-top: 0; }

  .lista-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: background 0.2s;
  }
  .lista-item.usado {
    background: rgba(58,255,160,0.06);
    border-color: rgba(58,255,160,0.15);
  }
  .lista-item-num {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
    color: var(--accent); min-width: 44px;
    flex-shrink: 0;
  }
  .lista-item.usado .lista-item-num { color: #3affa0; }
  .lista-item-nombre {
    flex: 1; font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lista-item-hora {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 11px;
    color: #3affa0; flex-shrink: 0;
  }
  .lista-item-pendiente {
    font-size: 11px; color: var(--muted); flex-shrink: 0;
  }
  .lista-item-badge {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
  }
  .badge-ok { background: rgba(58,255,160,0.2); }
  .badge-pending { background: rgba(255,255,255,0.06); }

  .lista-empty {
    text-align: center; color: var(--muted); font-size: 13px;
    padding: 2rem;
    font-family: 'Syne', sans-serif;
  }

  /* ── RESULTADO ── */
  #section-resultado {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
    transition: opacity 0.3s;
  }
  #section-resultado.ok { background: #0a2a1a; }
  #section-resultado.error { background: #2a0a0a; }
  #section-resultado.warning { background: #2a1e0a; }

  .resultado-icon { font-size: 5rem; margin-bottom: 1rem; line-height: 1; }
  .resultado-titulo {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 0.5rem;
  }
  .resultado-titulo.ok { color: #3affa0; }
  .resultado-titulo.error { color: #ff5c5c; }
  .resultado-titulo.warning { color: #ffc145; }
  .resultado-nombre { font-size: 1.2rem; color: rgba(255,255,255,0.8); margin-bottom: 0.25rem; font-weight: 500; }
  .resultado-ticket { font-family: 'Syne', sans-serif; font-size: 1rem; color: rgba(255,255,255,0.4); margin-bottom: 2rem; letter-spacing: 0.1em; }
  .resultado-usado-cuando { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 2rem; }

  .btn-volver {
    padding: 14px 32px; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    background: rgba(255,255,255,0.1); color: white;
    transition: background 0.2s;
  }
  .btn-volver:hover { background: rgba(255,255,255,0.2); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">Mehitor <span>·</span> Puerta</div>
  <div class="status-dot" id="status-dot"></div>
</header>

<!-- SELECCIÓN DE EVENTO -->
<div id="section-evento">
  <div class="evento-card">
    <div style="font-size:2.5rem; margin-bottom:1rem">🎟️</div>
    <h2>Control de Puerta</h2>
    <p>Seleccioná el evento para comenzar</p>
    <div class="eventos-lista" id="eventos-lista">
      <button class="btn-evento" data-slug="picada-de-motos-mehitor">
        <span class="btn-evento-icon">🏍️</span>
        <span class="btn-evento-nombre">Picada de Motos - Mehitor</span>
        <span class="btn-evento-arrow">→</span>
      </button>
      <!-- Agregar más eventos acá cuando sea necesario -->
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="section-scanner" class="hidden">

  <!-- Cámara -->
  <div id="camera-section">
    <div id="reader"></div>

    <div class="scanner-overlay">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">Apuntá la cámara al QR del boleto</div>
    </div>

    <button id="btn-ver-lista">↓ Lista</button>
    <div class="contador" id="contador">— escaneados hoy</div>
    <button class="manual-btn" id="btn-manual-toggle">✏️ Manual</button>

    <div class="manual-wrap hidden" id="manual-wrap">
      <input type="text" class="manual-input" id="manual-input" placeholder="Número de boleto..." inputmode="numeric">
      <button class="manual-submit" id="manual-submit">Verificar</button>
    </div>
  </div>

  <!-- Lista en tiempo real -->
  <div id="lista-section">
    <div class="lista-header">
      <div class="lista-titulo">Boletos en tiempo real</div>
      <div class="lista-stats-chips">
        <div class="chip chip-ok" id="chip-ingresaron">0 ingresaron</div>
        <div class="chip chip-pending" id="chip-pendientes">0 pendientes</div>
      </div>
    </div>
    <div id="lista-items">
      <div class="lista-empty">Cargando boletos...</div>
    </div>
  </div>

</div>

<!-- RESULTADO -->
<div id="section-resultado" class="hidden">
  <div class="resultado-icon" id="resultado-icon"></div>
  <div class="resultado-titulo" id="resultado-titulo"></div>
  <div class="resultado-nombre" id="resultado-nombre"></div>
  <div class="resultado-ticket" id="resultado-ticket"></div>
  <div class="resultado-usado-cuando" id="resultado-usado-cuando"></div>
  <button class="btn-volver" id="btn-volver">← Escanear otro</button>
</div>

<script type="module">
  const $ = id => document.getElementById(id);
  const show = id => $(id).classList.remove('hidden');
  const hide = id => $(id).classList.add('hidden');

  let eventoSlug = '';
  let scanner = null;
  let procesando = false;
  let unsubscribeLista = null;
  let escaneadosHoy = parseInt(localStorage.getItem('escaneados_hoy') || '0');
  let ultimaFecha = localStorage.getItem('escaneados_fecha') || '';
  const hoy = new Date().toDateString();
  if(ultimaFecha !== hoy) { escaneadosHoy = 0; localStorage.setItem('escaneados_fecha', hoy); }

  function actualizarContador() {
    $('contador').textContent = `${escaneadosHoy} escaneado${escaneadosHoy!==1?'s':''} hoy`;
    localStorage.setItem('escaneados_hoy', escaneadosHoy);
  }

  // ── SELECCIÓN DE EVENTO ──
  document.querySelectorAll('.btn-evento').forEach(btn => {
    btn.addEventListener('click', () => {
      eventoSlug = btn.dataset.slug;
      hide('section-evento');
      show('section-scanner');
      actualizarContador();
      iniciarScanner();
      iniciarListaRealtime();
    });
  });

  // ── CHEQUEAR URL PARAMS ──
  const params = new URLSearchParams(window.location.search);
  if(params.get('evento') && params.get('boleto')) {
    const ev = params.get('evento');
    const bol = params.get('boleto');
    window.addEventListener('load', () => {
      setTimeout(() => {
        eventoSlug = ev;
        hide('section-evento');
        verificarBoleto(bol);
      }, 1000);
    });
  }

  // ── SCANNER ──
  function iniciarScanner() {
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 200, height: 200 }, aspectRatio: 0.56 },
      onQRDetected,
      () => {}
    ).catch(() => {
      show('manual-wrap');
    });
  }

  async function onQRDetected(text) {
    if(procesando) return;
    procesando = true;
    if(navigator.vibrate) navigator.vibrate(50);
    let boleto = text;
    try {
      const url = new URL(text);
      boleto = url.searchParams.get('boleto') || text;
      const ev = url.searchParams.get('evento');
      if(ev) eventoSlug = ev;
    } catch(e) {}
    await verificarBoleto(boleto);
  }

  async function verificarBoleto(boleto) {
    show('section-resultado');
    $('section-resultado').className = '';
    $('resultado-icon').textContent = '⏳';
    $('resultado-titulo').textContent = 'Verificando...';
    $('resultado-titulo').className = 'resultado-titulo';
    $('resultado-nombre').textContent = '';
    $('resultado-ticket').textContent = `BOLETO ${boleto}`;
    $('resultado-usado-cuando').textContent = '';

    if(!window._firestoreReady) {
      mostrarError('Firebase no disponible', 'Verificá la conexión a internet');
      return;
    }
    try {
      const db = window._db;
      const docRef = window._doc(db, 'eventos', eventoSlug, 'boletos', boleto);
      const snap = await window._getDoc(docRef);

      if(!snap.exists()) {
        mostrarResultado('error', '❌', 'Boleto inválido', '', boleto, 'Este boleto no existe en el sistema');
        return;
      }
      const data = snap.data();
      if(data.usado) {
        const cuando = data.usadoEn
          ? new Date(data.usadoEn).toLocaleTimeString('es-UY', {hour:'2-digit', minute:'2-digit'})
          : '';
        mostrarResultado('error', '🚫', 'Ya utilizado', data.nombre, boleto, cuando ? `Usado a las ${cuando}` : 'Este boleto ya fue utilizado');
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        return;
      }
      await window._updateDoc(docRef, {
        usado: true,
        usadoEn: new Date().toISOString()
      });
      escaneadosHoy++;
      actualizarContador();
      mostrarResultado('ok', '✅', '¡Bienvenido!', data.nombre, boleto, '');
      if(navigator.vibrate) navigator.vibrate(200);
    } catch(err) {
      mostrarError('Error de conexión', 'Verificá el internet e intentá de nuevo');
    }
  }

  function mostrarResultado(tipo, icon, titulo, nombre, ticket, extra) {
    $('section-resultado').className = tipo;
    $('resultado-icon').textContent = icon;
    $('resultado-titulo').textContent = titulo;
    $('resultado-titulo').className = `resultado-titulo ${tipo}`;
    $('resultado-nombre').textContent = nombre;
    $('resultado-ticket').textContent = ticket ? `BOLETO ${ticket}` : '';
    $('resultado-usado-cuando').textContent = extra;
    show('section-resultado');
  }

  function mostrarError(titulo, extra) {
    mostrarResultado('error', '⚠️', titulo, '', '', extra);
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
  }

  $('btn-volver').addEventListener('click', () => {
    hide('section-resultado');
    procesando = false;
    $('manual-input').value = '';
  });

  // ── MANUAL ──
  $('btn-manual-toggle').addEventListener('click', () => {
    $('manual-wrap').classList.toggle('hidden');
    if(!$('manual-wrap').classList.contains('hidden')) $('manual-input').focus();
  });
  $('manual-submit').addEventListener('click', () => {
    const val = $('manual-input').value.trim();
    if(!val) return;
    procesando = false;
    verificarBoleto(val);
  });
  $('manual-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') $('manual-submit').click();
  });

  // ── FLECHA VER LISTA ──
  $('btn-ver-lista').addEventListener('click', () => {
    $('lista-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── LISTA EN TIEMPO REAL ──
  function iniciarListaRealtime() {
    if(!window._firestoreReady) return;

    const db = window._db;
    const colRef = window._collection(db, 'eventos', eventoSlug, 'boletos');

    unsubscribeLista = window._onSnapshot(colRef, (snapshot) => {
      const boletos = [];
      snapshot.forEach(doc => boletos.push({ id: doc.id, ...doc.data() }));

      // Separar en usados y pendientes
      const usados = boletos
        .filter(b => b.usado)
        .sort((a, b) => {
          if(a.usadoEn && b.usadoEn) return new Date(b.usadoEn) - new Date(a.usadoEn);
          return 0;
        });
      const pendientes = boletos
        .filter(b => !b.usado)
        .sort((a, b) => {
          const na = parseInt(a.ticket) || 0;
          const nb = parseInt(b.ticket) || 0;
          return na - nb;
        });

      // Actualizar chips
      $('chip-ingresaron').textContent = `${usados.length} ingresaron`;
      $('chip-pendientes').textContent = `${pendientes.length} pendientes`;

      // Render lista
      const container = $('lista-items');
      container.innerHTML = '';

      if(boletos.length === 0) {
        container.innerHTML = '<div class="lista-empty">No hay boletos para este evento todavía</div>';
        return;
      }

      // Ingresados
      if(usados.length > 0) {
        const sepOk = document.createElement('div');
        sepOk.className = 'lista-separador';
        sepOk.textContent = `✅ Ingresaron (${usados.length})`;
        container.appendChild(sepOk);
        usados.forEach(b => container.appendChild(crearItem(b)));
      }

      // Pendientes
      if(pendientes.length > 0) {
        const sepPend = document.createElement('div');
        sepPend.className = 'lista-separador';
        sepPend.textContent = `⏳ Pendientes (${pendientes.length})`;
        container.appendChild(sepPend);
        pendientes.forEach(b => container.appendChild(crearItem(b)));
      }
    }, (error) => {
      console.error('Error escuchando lista:', error);
    });
  }

  function crearItem(b) {
    const div = document.createElement('div');
    div.className = 'lista-item' + (b.usado ? ' usado' : '');

    const num = document.createElement('div');
    num.className = 'lista-item-num';
    num.textContent = b.ticket || b.id;

    const nombre = document.createElement('div');
    nombre.className = 'lista-item-nombre';
    nombre.textContent = b.nombre || '—';

    const estado = document.createElement('div');
    if(b.usado && b.usadoEn) {
      estado.className = 'lista-item-hora';
      estado.textContent = new Date(b.usadoEn).toLocaleTimeString('es-UY', {hour:'2-digit', minute:'2-digit'});
    } else {
      estado.className = 'lista-item-pendiente';
      estado.textContent = 'pendiente';
    }

    const badge = document.createElement('div');
    badge.className = 'lista-item-badge ' + (b.usado ? 'badge-ok' : 'badge-pending');
    badge.textContent = b.usado ? '✅' : '○';

    div.appendChild(num);
    div.appendChild(nombre);
    div.appendChild(estado);
    div.appendChild(badge);
    return div;
  }
</script>
</body>
</html>
